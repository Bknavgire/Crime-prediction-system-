<!DOCTYPE html>
<html>
<head>
    <title>Crime Rate Prediction</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            padding: 30px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }

        h2 {
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Crime Rate Prediction</h1>

    <form method="POST">
        <input type="number" name="year" placeholder="Enter Year" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h2>Predicted Crime Rate: {{ prediction }}</h2>
    {% endif %}
</div>

</body>
</html>
